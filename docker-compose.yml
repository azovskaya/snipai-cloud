version: "3.9"

services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: snipai_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  snipai:
    build: .
    container_name: snipai_app
    command: python -u src/app.py
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - model_cache:/root/.cache/huggingface
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DATA_DIR=/app/data
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_storage:
  model_cache:
  